<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supertails — Meet Kiya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #E8521A;
  --dark:   #1A1A1A;
  --slate:  #5A6A7A;
  --muted:  #94A3B8;
  --border: #E8E8E8;
  --green:  #8DC63F;
  --bg:     #FAFAF8;
  --white:  #FFFFFF;
  --card:   #F4F3F0;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  overflow: hidden;
}

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-rows: 56px 52px 1fr;
  height: 100vh;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo svg { width: 24px; height: 24px; }
.logotext { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; }
.logotext span { color: var(--orange); }
.hdr-right { font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }

/* ── STAGE NAV ── */
.nav {
  display: flex;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }

.nav-btn {
  flex: 1; min-width: 110px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px;
  padding: 8px 4px;
  border: none; background: transparent;
  cursor: pointer; position: relative;
  transition: background 0.18s;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover { background: #FFF4EE; }
.nav-btn.on { background: #FFF4EE; }
.nav-btn.on::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0;
  height: 2px; background: var(--orange); z-index: 2;
}

.nav-dot {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--border); color: var(--muted);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.22s;
}
.nav-btn.live .nav-dot { background: var(--orange); color: white; box-shadow: 0 2px 8px rgba(232,82,26,0.3); }
.nav-btn.on  .nav-dot { background: var(--orange); color: white; transform: scale(1.18); box-shadow: 0 0 0 4px rgba(232,82,26,0.14); }

.nav-label { font-size: 10px; font-weight: 600; color: var(--muted); text-align: center; line-height: 1.25; }
.nav-btn.live .nav-label { color: var(--dark); }
.nav-btn.on   .nav-label { color: var(--orange); }

.pip { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-left: 3px; vertical-align: middle; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── BODY ── */
.body {
  display: grid;
  grid-template-columns: 1fr 480px;
  overflow: hidden;
}

/* ── PHOTO PANEL ── */
.photo-panel {
  position: relative;
  overflow: hidden;
  background: #111;
}

.photo-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  transition: opacity 0.5s ease, transform 0.6s ease;
  display: block;
}

.photo-img.fade { opacity: 0; transform: scale(1.03); }

/* Gradient overlay bottom */
.photo-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to top, rgba(10,8,5,0.88) 0%, transparent 100%);
  pointer-events: none;
}

/* Big stage text over photo */
.photo-text {
  position: absolute;
  bottom: 32px; left: 36px; right: 36px;
}

.photo-age {
  display: inline-block;
  background: var(--orange);
  color: white;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.5px;
  padding: 5px 14px; border-radius: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(232,82,26,0.4);
}

.photo-heading {
  font-family: 'DM Serif Display', serif;
  font-size: 38px; font-weight: 400;
  color: white; line-height: 1.12;
  margin-bottom: 10px;
  text-shadow: 0 2px 16px rgba(0,0,0,0.4);
}

.photo-sub {
  font-size: 16px; color: rgba(255,255,255,0.82);
  line-height: 1.5; font-weight: 400;
  max-width: 480px;
}

/* ── RIGHT PANEL ── */
.right {
  display: flex; flex-direction: column;
  background: var(--white);
  border-left: 1px solid var(--border);
  overflow-y: auto;
}

/* Services block */
.block {
  padding: 28px 32px;
  border-bottom: 1px solid var(--border);
}

.block-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
}

/* Service rows */
.svc-list { display: flex; flex-direction: column; gap: 10px; }

.svc {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.18s, background 0.18s;
  cursor: default;
}
.svc:hover { border-color: var(--orange); background: #FFF4EE; }

.svc-icon {
  font-size: 22px; flex-shrink: 0;
  line-height: 1; margin-top: 1px;
}

.svc-body strong {
  display: block; font-size: 15px; font-weight: 600;
  color: var(--dark); margin-bottom: 3px;
  line-height: 1.3;
}
.svc-body span { font-size: 13px; color: var(--slate); line-height: 1.45; }

/* Data chips */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--card); color: var(--slate);
  border: 1px solid var(--border);
}
.chip.hot {
  background: #FFF0E8;
  border-color: rgba(232,82,26,0.22);
  color: var(--orange);
}

/* Status */
.status {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 600;
  padding: 13px 18px; border-radius: 8px; margin: 0 32px 28px;
}
.status.live { background: #F0FAE6; color: #3A6418; }
.status.plan { background: var(--card); color: var(--muted); }
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status.live .sdot { background: var(--green); animation: pulse 2s infinite; }
.status.plan .sdot { background: var(--muted); }

/* Arrow nav hint */
.key-hint {
  text-align: center;
  font-size: 11px; color: var(--muted);
  padding: 0 32px 20px; margin-top: auto;
}

/* Transitions */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: slideUp 0.32s ease both; }
.svc:nth-child(1){animation-delay:0.03s}
.svc:nth-child(2){animation-delay:0.07s}
.svc:nth-child(3){animation-delay:0.11s}
.svc:nth-child(4){animation-delay:0.15s}
</style>
</head>

// ── Render nav ───────────────────────────────────────────────────────
function renderNav() {
  document.getElementById('nav').innerHTML = S.map((s,i) => `
    <button class="nav-btn ${s.live?'live':''} ${i===1?'on':''}" onclick="go(${i})" id="nb${i}">
      <div class="nav-dot">${i+1}</div>
      <div class="nav-label">${s.name.replace('\n','<br>')}${s.live?'<span class="pip"></span>':''}</div>
    </button>`).join('');
}

// ── Render right panel ───────────────────────────────────────────────
function renderRight(idx) {
  const s = S[idx];
  document.getElementById('right').innerHTML = `
    <div class="block">
      <div class="block-label">What Supertails does here</div>
      <div class="svc-list">
        ${s.svcs.map(v=>`
          <div class="svc anim">
            <div class="svc-icon">${v.i}</div>
            <div class="svc-body">
              <strong>${v.t}</strong>
              <span>${v.d}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="block">
      <div class="block-label">What we learn about Kiya</div>
      <div class="chips anim">
        ${s.data.map((d,i)=>`<span class="chip ${s.hot.includes(i)?'hot':''}">${d}</span>`).join('')}
      </div>
    </div>

    <div class="status ${s.islive?'live':'plan'} anim">
      <div class="sdot"></div>${s.status}
    </div>

    <div class="key-hint">← → to navigate stages</div>
  `;
}

// ── Render photo panel ───────────────────────────────────────────────
let imgLoaded = false;

function renderPhoto(idx) {
  const s = S[idx];
  const img = document.getElementById('photo');

  img.classList.add('fade');
  setTimeout(() => {
    img.src = s.photo;
    img.onload = () => img.classList.remove('fade');
    // fallback in case image doesn't load
    setTimeout(() => img.classList.remove('fade'), 800);
  }, 250);

  document.getElementById('photoAge').textContent  = s.age;
  document.getElementById('photoHead').textContent = s.head;
  document.getElementById('photoSub').textContent  = s.sub;
}

// ── Go to stage ──────────────────────────────────────────────────────
let cur = 1;

function go(idx) {
  cur = idx;
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('on', i===idx));
  renderPhoto(idx);
  renderRight(idx);
}

// ── Keyboard ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && cur < S.length-1) go(cur+1);
  if (e.key === 'ArrowLeft'  && cur > 0)          go(cur-1);
});

// ── Init ─────────────────────────────────────────────────────────────
renderNav();
go(1);
